name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        # --if-present keeps CI green on branches that predate the test
        # suite (e.g. the bare scaffold on main before the app PR merges).
        run: npm run test --if-present

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
